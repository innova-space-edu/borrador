<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Innova Space Education</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #edeaff 0%, #e8e9ff 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
    }
    #avatar-mira {
      width: 120px;   /* AVATAR GRANDE */
      height: 120px;
      margin: 0 auto;
      display: block;
      transition: filter 0.3s, opacity 0.3s;
      filter: drop-shadow(0 0 32px #b48af7) grayscale(0.2) brightness(1.08);
    }
    #avatar-mira.pulse {
      animation: halo-glow 1.4s infinite alternate;
      filter: drop-shadow(0 0 44px #96f7f3) brightness(1.25);
    }
    @keyframes halo-glow {
      from { filter: drop-shadow(0 0 20px #98a6ea) brightness(1.1);}
      to { filter: drop-shadow(0 0 70px #60f6e9) brightness(1.25);}
    }
    .bubble-mira {
      background: #f7f7fc;
      color: #181846;
      margin: 1.3em auto 0.7em auto;
      max-width: 670px;
      width: 90vw;
      border-radius: 1.5em;
      padding: 1.3em 1.7em 1.2em 1.2em;
      font-size: 1.2rem;
      box-shadow: 0 4px 32px #8f99d811;
    }
    .bubble-user {
      background: #e3d7fd;
      color: #5f3896;
      max-width: 540px;
      width: 84vw;
      margin: 1.2em auto 0.2em auto;
      border-radius: 1.5em 1.5em 0.9em 1.5em;
      padding: 1em 1.2em 0.9em 1em;
      font-size: 1.13rem;
      font-weight: 500;
      text-align: right;
      box-shadow: 0 2px 16px #bb99ff20;
    }
    .chat-mainarea {
      width: 100vw;
      max-width: 850px;
      margin: 0 auto;
      min-height: 74vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-bottom: 2em;
    }
    #chat-history {
      flex: 1 1 auto;
      overflow-y: auto;
      margin-bottom: 1.3em;
      max-height: 60vh;
      min-height: 260px;
    }
    #user-input-area {
      max-width: 740px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.8em;
    }
    #user-input-box {
      display: flex;
      gap: 0.6em;
      align-items: center;
    }
    #user-input {
      flex: 1 1 auto;
      padding: 1.3em 1.1em;
      border-radius: 1.1em;
      border: 1.7px solid #cfcbe6;
      background: #f6f4ff;
      font-size: 1.1em;
      color: #29265b;
      box-shadow: 0 0.5px 2px #ebe9fa6a;
      transition: border .2s;
    }
    #user-input:focus {
      border: 1.7px solid #7b5be8;
      outline: none;
      background: #fcfbfe;
    }
    #send-btn {
      background: #b48af7;
      color: #fff;
      font-weight: 600;
      border-radius: 0.9em;
      padding: 1em 2.2em;
      border: none;
      font-size: 1.13em;
      box-shadow: 0 2px 9px #cdb6ff2a;
      transition: background 0.18s;
    }
    #send-btn:hover {
      background: #8855e6;
      cursor: pointer;
    }
    #volume-controls {
      margin: 0.7em auto 0 auto;
      text-align: center;
    }
    #volume-slider {
      width: 120px;
      vertical-align: middle;
      margin-left: 10px;
    }
    #mute-btn {
      margin-left: 6px;
      font-size: 1.5em;
      background: none;
      border: none;
      cursor: pointer;
      vertical-align: middle;
      color: #7b5be8;
    }
  </style>
</head>
<body>
  <!-- AVATAR GRANDE Y TÍTULO -->
  <div style="text-align:center;margin-top:1.5em;">
    <img id="avatar-mira" src="avatar_mira.svg" alt="MIRA Avatar">
    <h1 style="margin:0.1em 0 0.25em 0;font-size:2.5em;font-weight:900;color:#3a329a;">Asistente IA - MIRA</h1>
  </div>
  <!-- ZONA DE CHAT PRINCIPAL -->
  <main class="chat-mainarea">
    <section id="chat-history">
      <div class="bubble-mira"><strong>MIRA:</strong> ¡Hola! Soy MIRA, tu asistente virtual. ¿En qué puedo ayudarte hoy?</div>
    </section>
    <section id="user-input-area">
      <div id="user-input-box">
        <input id="user-input" type="text" autocomplete="off" placeholder="Escribe tu mensaje..." />
        <button id="send-btn">Enviar</button>
      </div>
      <!-- Volumen debajo del input -->
      <div id="volume-controls">
        <button id="mute-btn" title="Voz activada"><span id="mute-icon">🔊</span></button>
        <input id="volume-slider" type="range" min="0" max="100" value="100">
      </div>
    </section>
  </main>
  <script src="chat.js"></script>
</body>
</html>
