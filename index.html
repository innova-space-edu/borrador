<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIRA - Asistente Educativa</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tailwindcss/forms@0.5.2/dist/forms.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: white;
      height: 100vh;
      overflow: hidden;
    }
    #avatar {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 100px;
      height: 100px;
      z-index: 50;
      cursor: move;
    }
    #sidebar {
      width: 250px;
      background-color: #2a0845;
      transition: width 0.3s;
    }
    #sidebar.collapsed {
      width: 40px;
    }
    #toggleSidebar {
      background-color: #4717f6;
      color: white;
      border: none;
      padding: 5px 10px;
      cursor: pointer;
    }
    .chat-container {
      height: calc(100vh - 40px);
      overflow-y: auto;
      padding: 1rem;
    }
    .input-area {
      display: flex;
      align-items: center;
      padding: 0.5rem;
      background: #0f3460;
    }
    .input-area input {
      flex: 1;
      padding: 0.5rem;
      border-radius: 0.5rem;
      border: none;
      margin-right: 0.5rem;
    }
    #muteBtn {
      background: none;
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="flex h-screen">
    <div id="sidebar" class="flex flex-col p-2">
      <button id="toggleSidebar">☰</button>
      <button onclick="newChat()" class="mt-4">+ Nuevo chat</button>
      <div id="chatList" class="mt-2 text-sm"></div>
    </div>
    <div class="flex flex-col flex-1">
      <div class="flex justify-between items-center bg-purple-900 px-6 py-2">
        <h1 class="text-xl font-bold">MIRA - Asistente Educativa</h1>
        <button id="muteBtn" onclick="toggleMute()">🔊</button>
      </div>
      <div id="chatBox" class="chat-container"></div>
      <div class="input-area">
        <input type="text" id="userInput" placeholder="Escribe aquí..." onkeydown="handleKey(event)" />
        <button onclick="sendMessage()">Enviar</button>
      </div>
    </div>
    <img id="avatar" src="avatar_mira.png" alt="MIRA avatar" draggable="true">
  </div>

  <script src="chat.js"></script>
</body>
</html>
