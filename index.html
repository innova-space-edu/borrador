<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MIRA AI - Innova Space</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #e6e9f0 0%, #eef1f5 100%);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #chat-container {
      width: 90%;
      max-width: 720px;
      height: 440px;
      background: #3c3262ee;
      border-radius: 1.5rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      padding: 1.8rem;
      color: white;
      overflow-y: auto;
    }
    #chat-input-area {
      position: fixed;
      bottom: 2rem;
      width: 90%;
      max-width: 720px;
      display: flex;
      align-items: center;
      background: white;
      border-radius: 1rem;
      padding: 0.5rem 1rem;
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
      gap: 0.5rem;
    }
    #user-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 1rem;
    }
    #send-btn {
      background: linear-gradient(90deg, #a855f7, #40c9ff);
      border: none;
      color: white;
      border-radius: 0.8rem;
      padding: 0.6rem 1.2rem;
      font-weight: bold;
      cursor: pointer;
    }
    #volume-btn {
      background: transparent;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
    }
    #avatar-mira {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      box-shadow: 0 0 14px rgba(0,0,0,0.2);
      cursor: grab;
    }
  </style>
</head>
<body>
  <img src="avatar_mira.svg" id="avatar-mira" alt="MIRA" draggable="false">
  <div id="chat-container" class="chat-markdown"></div>
  <div id="chat-input-area">
    <input id="user-input" type="text" placeholder="Escribe tu mensaje...">
    <button id="send-btn">Enviar</button>
    <button id="volume-btn" title="Activar/Desactivar voz"><span id="vol-icon">🔊</span></button>
  </div>
  <script src="chat.js"></script>
</body>
</html>
