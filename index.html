<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIRA - Asistente Educativa</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="styles.css">
  <script defer src="chat.js"></script>
  <script defer src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script defer id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom right, #1b1f3b, #2b2d42);
      color: white;
      overflow: hidden;
    }
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      background-color: #3d0c59;
      padding: 10px;
      width: 220px;
      transition: transform 0.3s ease;
      z-index: 10;
    }
    #sidebar.closed {
      transform: translateX(-100%);
    }
    #toggleSidebar {
      background-color: transparent;
      color: white;
      border: none;
      font-size: 24px;
      cursor: pointer;
    }
    #chat-container {
      margin-left: 220px;
      padding: 20px;
      overflow-y: auto;
      height: calc(100vh - 60px);
    }
    .chat-entry {
      margin: 10px 0;
    }
    #input-container {
      position: fixed;
      bottom: 0;
      left: 220px;
      right: 0;
      background-color: #1f1f2e;
      padding: 10px;
      display: flex;
    }
    #input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
    }
    #volume-btn {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }
    #avatar {
      position: fixed;
      bottom: 10px;
      right: 10px;
      width: 100px;
      z-index: 99;
      cursor: move;
      transition: transform 0.3s ease-in-out;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <button id="toggleSidebar">☰</button>
    <br>
    <button onclick="startNewChat()">+ Nuevo chat</button>
    <div id="chat-list"></div>
  </div>

  <div id="chat-container">
    <h2>MIRA - Asistente Educativa</h2>
    <button id="volume-btn" onclick="toggleVolume()">🔊</button>
    <div id="messages"></div>
  </div>

  <div id="input-container">
    <input id="input" type="text" placeholder="Escribe aquí..." onkeydown="handleInput(event)" />
  </div>

  <img id="avatar" src="avatar_mira.svg" alt="MIRA avatar" draggable="true">
</body>
</html>
