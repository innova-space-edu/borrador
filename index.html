<body class="bg-gradient-to-br from-black via-indigo-900 to-purple-900 text-white font-sans scroll-smooth">

  <!-- Aquí va el contenido existente de tu página -->
  <!-- AÑADE ESTO DONDE QUIERAS MOSTRAR EL INPUT DE IMAGEN -->

  <div class="w-full flex justify-center mt-6">
    <label class="block text-sm font-medium text-purple-300">Sube una imagen para analizar</label>
  </div>
  <div class="w-full flex justify-center mt-2 mb-6">
    <input type="file" accept="image/*" onchange="analyzeImage(event)"
           class="text-sm text-purple-100 bg-purple-700 file:bg-purple-500 file:text-white file:px-3 file:py-1 file:rounded-md file:border-none rounded-md border border-purple-400 p-1 max-w-xs" />
  </div>

  <!-- Scripts -->
  <script>
    async function analyzeImage(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onloadend = async () => {
        const base64Image = reader.result.split(',')[1];
        const choice = confirm("¿Quieres extraer texto de la imagen (OCR)?\nPresiona Cancelar para obtener descripción IA.");
        const url = choice
          ? "https://api.ocr.space/parse/image"
          : "https://api-inference.huggingface.co/models/Salesforce/blip-image-captioning-base";

        const headers = choice
          ? { apikey: "K82378316388957", "Content-Type": "application/x-www-form-urlencoded" }
          : { Authorization: "Bearer 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" };

        const body = choice
          ? new URLSearchParams({ base64Image: `data:image/png;base64,${base64Image}` }).toString()
          : JSON.stringify({ inputs: `data:image/png;base64,${base64Image}` });

        const res = await fetch(url, { method: "POST", headers, body });
        const result = await res.json();

        const text = choice
          ? result.ParsedResults?.[0]?.ParsedText || "No se pudo leer texto."
          : result?.[0]?.generated_text || "No se pudo generar descripción.";

        const chatBox = document.getElementById("chat-box");
        if (chatBox) {
          const div = document.createElement("div");
          div.innerHTML = `<div class="bg-purple-800 text-white p-3 rounded-xl mb-2 max-w-2xl mx-auto">
            <strong>MIRA (imagen):</strong> ${text}
          </div>`;
          chatBox.appendChild(div);
          speakText(text); // <-- Reproduce la voz automáticamente
        } else {
          alert("Resultado:\n" + text);
          speakText(text);
        }
      };
      reader.readAsDataURL(file);
    }
  </script>

  <!-- Archivos de scripts -->
  <script src="chat.js"></script>
  <script src="speak.js"></script>
</body>
</html>
