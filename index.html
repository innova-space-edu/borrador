<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MIRA - Innova Space Education</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    #avatar-mira.pulse {
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-black via-indigo-900 to-purple-900 text-white font-sans h-screen overflow-hidden">
  <div class="flex h-full">
    <!-- Panel lateral -->
    <div id="side-panel" class="bg-indigo-950 w-16 hover:w-64 transition-all duration-300 p-2 overflow-hidden">
      <button onclick="crearNuevoChat()" class="text-white text-sm w-full text-left mb-2">+ Nuevo chat</button>
      <div id="lista-chats" class="text-xs space-y-1"></div>
    </div>

    <!-- Área de conversación -->
    <div class="flex-1 flex flex-col">
      <div class="flex items-center justify-between p-4 bg-indigo-800">
        <h1 class="text-xl font-light tracking-wider">MIRA - Asistente Educativa</h1>
        <img id="avatar-mira" src="avatar_mira.png" alt="MIRA" class="w-14 h-14 rounded-full shadow-lg"/>
      </div>
      <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-2 text-sm"></div>
      <div class="p-4 bg-indigo-950">
        <input id="user-input" type="text" placeholder="Escribe tu mensaje..." class="w-full px-4 py-2 rounded text-black"/>
      </div>
    </div>
  </div>
  <script src="chat.js"></script>
</body>
</html>
