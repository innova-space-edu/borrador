<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Innova Space Education</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-P64ZZSCZ7Z"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-P64ZZSCZ7Z');
  </script>

  <!-- Tailwind + Markdown + MathJax -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    body {
      background: linear-gradient(to bottom right, #000, #312e81, #581c87);
      color: white;
      font-family: sans-serif;
      scroll-behavior: smooth;
      margin: 0;
      padding: 0;
    }

    #avatar-mira {
      width: 60px;
      height: 60px;
      margin-left: 15px;
      transition: filter 0.3s, opacity 0.3s;
      opacity: 1;
      filter: grayscale(0.4) brightness(0.8);
    }

    #avatar-mira.pulse {
      animation: halo-glow 1.2s infinite alternate;
      filter: drop-shadow(0 0 16px #a855f7) brightness(1.25);
    }

    @keyframes halo-glow {
      from { filter: drop-shadow(0 0 12px #4f46e5) brightness(1.18); }
      to   { filter: drop-shadow(0 0 36px #38bdf8) brightness(1.45); }
    }

    .chat-markdown table {
      border-collapse: collapse;
      width: 100%;
      margin: 0.5em 0;
      background: #22223b;
      color: #fafafa;
    }

    .chat-markdown th, .chat-markdown td {
      border: 1px solid #7f5af0;
      padding: 6px 10px;
      text-align: left;
    }

    .chat-markdown th {
      background: #4f378b;
    }
  </style>
</head>

<body class="text-white">

  <!-- Título -->
  <section class="pt-10 text-center">
    <h1 class="text-5xl font-extrabold bg-gradient-to-r from-pink-400 via-purple-400 to-blue-400 text-transparent bg-clip-text">
      Innova Space Education
    </h1>
    <p class="text-lg text-gray-300 mt-3">Educación del futuro. Conectando estudiantes con IA.</p>
  </section>

  <!-- MIRA: Asistente Virtual -->
  <section class="pt-12 pb-10 px-4 relative">
    <div class="max-w-3xl mx-auto relative mt-4">
      <div class="flex items-center justify-center mb-8">
        <h2 class="text-4xl font-bold text-center mb-0">Asistente IA - MIRA</h2>
        <object id="avatar-mira" type="image/svg+xml" data="avatar_mira.svg" tabindex="-1" aria-hidden="true"></object>
      </div>
      <div class="bg-gray-900 border border-purple-500 rounded-xl p-4 shadow-xl">
        <div id="chat-box" class="h-72 overflow-y-auto bg-gray-800 p-3 rounded-md mb-4 text-sm space-y-2 text-white chat-markdown" aria-live="polite">
          <div><strong>MIRA:</strong> ¡Hola! Soy MIRA, tu asistente virtual. ¿En qué puedo ayudarte hoy?</div>
        </div>
        <div class="flex gap-2">
          <input
            type="text"
            id="user-input"
            placeholder="Escribe tu mensaje..."
            class="flex-1 p-2 rounded-md bg-gray-700 text-white border border-gray-600"
            autocomplete="off"
            onkeydown="if(event.key==='Enter'){sendMessage(); return false;}"
          >
          <button onclick="sendMessage()" class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-md text-white font-bold">
            Enviar
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- Créditos -->
  <section class="text-center mt-10 mb-6">
    <img src="logo.png" alt="Logo Innova Space" style="max-width:150px; margin:auto; opacity:0.95;">
    <p class="mt-3 text-sm text-gray-400">Creado por <strong>Innova Space</strong> y <strong>OpenAI</strong>.</p>
  </section>

  <!-- Chat IA con memoria -->
  <script src="chat.js"></script>

</body>
</html>
